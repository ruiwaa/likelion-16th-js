<!DOCTYPE html>
<html lang="ko-KR">

  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>자바스크립트 야간 학습</title>
    <link rel="icon" type="image/svg+xml" href="/javascript.svg" />
    <script type="module" src="./src/main.js"></script>
  </head>

  <body>

    <main data-main-container>
      <header>
        <h1 data-title>🎬 무드 시네마 (Mood Cinema)</h1>
        <p id="app-desc" data-description>
          현재 날씨와 기분을 선택해 주세요.<br />
          당신의 스코프에 꼭 맞는 음악을 큐레이션합니다.
        </p>
      </header>

      <div data-auth-shell data-state="logout">
        <form data-login-form novalidate>
          <div data-field-group>
            <label data-label for="weather">오늘의 날씨</label>
            <div data-select-wrapper>
              <select data-input id="weather" name="weather" required>
                <option value="">날씨 선택</option>
                <option value="sunny">맑음 ☀️</option>
                <option value="rainy">비 ☔</option>
                <option value="snowy">눈 ❄️</option>
              </select>
            </div>
          </div>

          <div data-field-group>
            <label data-label for="mood">현재 기분</label>
            <div data-select-wrapper>
              <select data-input id="mood" name="mood" required>
                <option value="">기분 선택</option>
                <option value="happy">행복함 😊</option>
                <option value="calm">차분함 ☕</option>
                <option value="energetic">활기참 🔥</option>
              </select>
            </div>
          </div>

          <button type="submit" data-submit-button>
            <span data-button-text>맞춤 OST 추천받기</span>
          </button>
        </form>

        <section data-dashboard-container aria-labelledby="result-title">
          <h2 id="result-title" class="sr-only">추천 결과 리포트</h2>

          <div data-content-display aria-live="polite">
          </div>

          <div data-action-group>
            <button type="button" data-logout-button>다시 선택하기</button>
          </div>
        </section>
      </div>
    </main>
  </body>

</html>
