<!doctype html>
<html lang="ko-KR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>자바스크립트 야간 학습</title>
    <link rel="icon" type="image/svg+xml" href="/javascript.svg" />
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <script type="module" src="./src/main.js"></script>
  </head>

  <body>
    <div data-container>
      <header>
        <h1 data-title>GSAP 기초 트윈 실습</h1>
        <p data-description>
          핵심 메서드와 이징(Easing)을 통해 애니메이션의 원리를 이해합니다.
        </p>
      </header>

      <main data-visual-stage>
        <div data-card role="img" aria-label="실습용 프리미엄 카드">
          <span data-card-label>LIKE LION</span>
        </div>
      </main>

      <nav data-control-panel role="group" aria-label="애니메이션 컨트롤러">
        <button type="button" data-action="set" aria-label="상태 즉시 설정">
          gsap.set()
        </button>
        <button
          type="button"
          data-action="from"
          aria-label="시작점에서 현재로 애니메이션"
        >
          gsap.from()
        </button>
        <button
          type="button"
          data-action="to"
          aria-label="목표 상태로 애니메이션"
        >
          gsap.to()
        </button>
        <button
          type="button"
          data-action="fromTo"
          aria-label="시작과 끝 모두 애니메이션"
        >
          gsap.fromTo()
        </button>
        <button type="button" data-action="reset" aria-label="상태 초기화">
          reset
        </button>
      </nav>
    </div>
  </body>
</html>
