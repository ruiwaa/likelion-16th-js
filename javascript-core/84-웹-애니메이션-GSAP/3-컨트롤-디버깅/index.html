<!DOCTYPE html>
<html lang="ko-KR">

  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>자바스크립트 야간 학습</title>
    <link rel="icon" type="image/svg+xml" href="/javascript.svg" />
    <script src="https://unpkg.com/gsap/dist/gsap.min.js"></script>
    <script type="module" src="./src/main.js"></script>
  </head>

  <body>

    <main data-main-container>
      <h1 data-title>GSAP 컨트롤 센터</h1>
      <p data-description>콜백 함수와 타임라인 메서드를 통해 애니메이션을 정교하게 제어해보세요.</p>

      <div data-visual-stage>
        <div role="none" data-anim-target="rocket">🚀</div>
        <div 
          data-status-indicator 
          data-current-state="waiting"
          aria-live="polite"
        >
          대기 중...
        </div>
      </div>

      <div data-control-panel>
        <div data-button-group role="group" aria-label="재생 컨트롤">
          <button type="button" data-action="play">재생 (play)</button>
          <button type="button" data-action="pause">일시정지 (pause)</button>
          <button type="button" data-action="resume">재개 (resume)</button>
          <button type="button" data-action="reverse">역재생 (reverse)</button>
          <button type="button" data-action="restart">재시작 (restart)</button>
        </div>

        <section data-debug-console>
          <h3 data-debug-title>디버깅 로그 (Debugging Logs)</h3>
          <ul data-log-list>
          </ul>
        </section>
      </div>
    </main>

  </body>

</html>
