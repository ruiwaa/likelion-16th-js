<!DOCTYPE html>
<html lang="ko-KR">

  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>자바스크립트 야간 학습</title>
    <link rel="icon" type="image/svg+xml" href="/javascript.svg" />
    <script type="module" src="./src/main.js"></script>
  </head>

  <body>

    <main data-main-container>
      <h1 data-title>명시적 바인딩(Explicit Binding)</h1>
      <p data-description>call, apply, bind를 활용해 함수의 주인을 직접 임명해 보세요.</p>

      <section data-lab-shell>
        <div data-object-inspector>
          <h2 data-sub-title>대상 객체</h2>
          <div data-card-group>
            <div data-obj-card="user">
              <span data-obj-name>user</span>
              <code>{ name: '하은주' }</code>
            </div>
            <div data-obj-card="admin">
              <span data-obj-name>admin</span>
              <code>{ name: '박형준' }</code>
            </div>
          </div>
        </div>

        <div data-control-center>
          <div data-input-group>
            <label data-label for="greeting-msg">인사 메시지 (인자 1)</label>
            <input data-input-greeting-msg id="greeting-msg" type="text" value="안녕!" />
          </div>
          <div data-input-group>
            <label data-label for="date-msg">데이트 메시지 (인자 2)</label>
            <input data-input-date-msg id="date-msg" type="text" value="주말에 뭐하니?" />
          </div>

          <div data-button-grid lang="en">
            <button type="button" data-bind-action="call">.call(admin, message)</button>
            <button type="button" data-bind-action="apply">.apply(user, [message])</button>
            <button type="button" data-bind-action="bind">.bind( { name: '야무' } )</button>
            <button
              type="button"
              data-bind-action="exec-bound"
              lang="ko-KR"
              disabled
            >
              바운드된 함수 실행
            </button>
          </div>
        </div>

        <div data-result-panel>
          <h3 data-sub-title>실행 결과</h3>
          <div data-display-screen>
            <p data-screen-text>버튼을 클릭하여 함수를 실행하세요.</p>
          </div>
          <div data-status-bar lang="en">
            <span>Current this: <strong data-current-this>없음</strong></span>
          </div>
        </div>
      </section>
    </main>

  </body>

</html>
