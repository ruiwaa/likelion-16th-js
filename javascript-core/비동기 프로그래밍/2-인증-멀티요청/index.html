<!DOCTYPE html>
<html lang="ko-KR">

  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>자바스크립트 야간 학습</title>
    <link rel="icon" type="image/svg+xml" href="/javascript.svg" />
    <script type="module" src="./src/main.js"></script>
  </head>

  <body>

    <main data-main-container>
      <h1 data-title>인증 및 데이터 관리</h1>
      <p data-description>사용자 정보를 입력하여 서비스를 이용하세요.</p>

      <div data-auth-shell data-state="logout">
        <!-- 
          michaelw / michaelwpass
          sophiab / sophiabpass
        -->
        <form data-login-form>
          <div data-field-group>
            <label data-label for="username">사용자 아이디</label>
            <input data-input type="text" id="username" name="username" value="avat" required />
          </div>

          <div data-field-group>
            <label data-label for="password">비밀번호</label>
            <input data-input type="password" id="password" name="password" value="avatpass" required />
          </div>

          <button type="submit" data-submit-button>
            <img data-loading-icon src="/loading.gif" width="14" alt="" hidden />
            <span data-button-text>로그인</span>
          </button>
        </form>

        <div data-dashboard-container>
          <div data-content-display>
          </div>
          <button type="button" data-logout-button>로그아웃</button>
        </div>
      </div>
    </main>

  </body>

</html>
