<!DOCTYPE html>
<html lang="ko-KR">

  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>자바스크립트 야간 학습</title>
    <link rel="icon" type="image/svg+xml" href="/javascript.svg" />
    <script type="module" src="./src/main.js"></script>
  </head>

  <body>

    <main data-main-container>
      <h1 data-title>불변성 관리</h1>
      <p data-description>데이터를 직접 뮤테이션(Mutation, 수정)하지 않고 안전하게 관리하는 방법을 배웁니다.</p>

      <div data-auth-shell data-state="logout">
        <form data-login-form>
          <div data-field-group>
            <label data-label for="manager-name">관리자 이름</label>
            <input data-input type="text" id="manager-name" name="managerName" value="yamoo9" required />
          </div>
          <button type="submit" data-submit-button>
            <span data-button-text>관리 세션 시작</span>
          </button>
        </form>

        <div data-dashboard-container>
          <div data-content-display>
          </div>
          <button type="button" data-logout-button>초기화 및 세션 종료</button>
        </div>
      </div>
    </main>
  </body>

</html>
