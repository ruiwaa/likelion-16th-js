<!DOCTYPE html>
<html lang="ko-KR">

  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>자바스크립트 야간 학습</title>
    <link rel="icon" type="image/svg+xml" href="/javascript.svg" />
    <script type="module" src="./src/main.js"></script>
  </head>

  <body>

    <main data-main-container>
      <header data-header>
        <h1 data-title>객체 지향 시스템 구조</h1>
        <p data-description>프로토타입 체인과 클래스 상속을 시각화합니다.</p>
      </header>

      <div data-auth-shell data-state="logout">
        <form data-login-form>
          <div data-field-group>
            <label data-label for="user-id">접속 계정</label>
            <input data-input type="text" id="user-id" name="id" value="yamoo9" required />
          </div>
          <div data-field-group>
            <label data-label for="user-pw">인증 암호</label>
            <input data-input type="password" id="user-pw" name="pw" value="qwerty!9" required />
          </div>
          <button type="submit" data-submit-button>
            <span data-button-text>시스템 진입</span>
          </button>
        </form>

        <div data-dashboard-container>
          <section data-content-display></section>
          <button type="button" data-logout-button>시스템 로그아웃</button>
        </div>
      </div>
    </main>

  </body>

</html>
